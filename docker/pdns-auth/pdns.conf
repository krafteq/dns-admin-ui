# PowerDNS Authoritative Server configuration

# SQLite backend
launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3
gsqlite3-pragma-synchronous=normal

# API
api=yes
api-key=changeme
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0

# DNS listener
local-address=0.0.0.0
local-port=53

# Logging
loglevel=4
log-dns-queries=yes
