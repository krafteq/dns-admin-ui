services:
  pdns-auth:
    build: ./docker/pdns-auth
    container_name: pdns-auth
    ports:
      - "8081:8081"   # API / webserver
      - "5300:53/udp" # DNS (mapped to 5300 to avoid conflict with host resolver)
      - "5300:53/tcp"
    volumes:
      - pdns-auth-data:/var/lib/powerdns
    networks:
      - dns-net
    healthcheck:
      test: ["CMD", "pdns_control", "rping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pdns-recursor:
    build: ./docker/pdns-recursor
    container_name: pdns-recursor
    command:
      - "--api-config-dir=/etc/powerdns/recursor.d"
    ports:
      - "8082:8082"   # API / webserver
      - "5301:53/udp" # DNS
      - "5301:53/tcp"
    volumes:
      - pdns-recursor-data:/etc/powerdns/recursor.d
    networks:
      - dns-net
    healthcheck:
      test: ["CMD", "rec_control", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak:
    build: ./docker/keycloak
    container_name: keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - dns-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

networks:
  dns-net:
    driver: bridge

volumes:
  pdns-auth-data:
  pdns-recursor-data:
